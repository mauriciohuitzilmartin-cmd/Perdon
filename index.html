<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 ¿Fer, amor, me perdonas? 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9eb5,#ffd1dc,#fff0f5);
}

.card{
    background:white;
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    width:500px;
    max-width:90%;
    position:relative;
}

h1{
    color:#e91e63;
    font-size:45px;
}

p{
    margin:20px 0;
    font-size:22px;
    color:#555;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
    transition:transform .25s, background .25s;
}

#si{
    background:#ff4081;
    color:white;
}

#si:hover{
    background:#e91e63;
}

#no{
    background:#777;
    color:white;
    position:absolute;
}

.corazon{
    position:fixed;
    top:-50px;
    pointer-events:none;
    animation:caer 5s linear forwards;
}

@keyframes caer{
    from{
        transform:translateY(-50px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

</style>

</head>

<body>

<div class="card" id="card">

    <h1>💖 ¿Fer, amor, me perdonas? 💖</h1>

    <p>
        Prometo hacer las cosas mejor.<br>
        Eres muy importante para mí ❤️
    </p>

    <button id="si">Sí 🥹</button>

    <button id="no">No 😒</button>

</div>

<script>

const no = document.getElementById("no");
const si = document.getElementById("si");
const card = document.getElementById("card");

let tamSi = 1;
let tamNo = 1;
let intentos = 0;

no.style.left = "310px";
no.style.top = "215px";

function moverBoton(){

    intentos++;

    // Crece el botón Sí
    tamSi += 0.20;
    si.style.transform = `scale(${tamSi})`;

    // Se hace pequeño el botón No
    tamNo -= 0.02;

    if(tamNo < 0.18){
        tamNo = 0.18;
    }

    no.style.transform = `scale(${tamNo})`;

    // Cambiar texto
    switch(intentos){

        case 1:
            no.innerHTML="¿Segura? 🤔";
            break;

        case 2:
            no.innerHTML="Piénsalo 🥺";
            break;

        case 3:
            no.innerHTML="Ándale ❤️";
            break;

        case 4:
            no.innerHTML="Última oportunidad 😭";
            break;

        case 5:
            no.innerHTML="Última o lloro 😭";
            break;

        case 6:
            no.innerHTML="Sé que me quieres 😭";
            break;

        case 7:
            no.innerHTML="Deja de intentar decir que no 😭";
            break;

        case 8:
            no.innerHTML="¿Quién más te va a bailar? 💃";
            break;

        case 9:
            no.innerHTML="Ya perdóname 😭";
            break;

        case 10:
            no.innerHTML="Me como una tortuga 🐢";
            break;

        case 11:
            no.innerHTML="O una iguana 🦎";
            break;

        case 12:
            no.innerHTML="Te beso los pies 🥹";
            break;

        case 13:
            no.innerHTML="Te hago pollo en rajas 🍗";
            break;

        case 14:
            no.innerHTML="¡Le pongo más rajas! 😂";
            break;

        case 15:
            no.innerHTML="Porrr favoooor 😭";
            break;

        default:
            no.innerHTML="Sí 😅";
    }

    const maxX = window.innerWidth - no.offsetWidth - 20;
    const maxY = window.innerHeight - no.offsetHeight - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    no.style.position = "fixed";
    no.style.left = x + "px";
    no.style.top = y + "px";

}

no.addEventListener("mouseover", moverBoton);
no.addEventListener("click", moverBoton);

si.addEventListener("click",()=>{

    card.innerHTML=`

        <h1 style="font-size:65px;">🥰❤️</h1>

        <h2 style="color:#e91e63;font-size:36px;margin-top:15px;">
            ¡Gracias!
        </h2>

        <p style="font-size:28px;margin-top:20px;">
            Tomaste la mejor decisión ❤️
            <br><br>
            Te quiero muchísimo 💕
        </p>

    `;

    lluviaCorazones();

});

function lluviaCorazones(){

    setInterval(()=>{

        const corazon=document.createElement("div");

        corazon.className="corazon";

        const corazones=["❤️","💖","💕","💗","💘"];

        corazon.innerHTML=corazones[Math.floor(Math.random()*corazones.length)];

        corazon.style.left=Math.random()*100+"vw";
        corazon.style.fontSize=(20+Math.random()*35)+"px";

        document.body.appendChild(corazon);

        setTimeout(()=>{
            corazon.remove();
        },5000);

    },180);

}

</script>

</body>
</html>
